name: GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * 1'  # Runs every Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  github-metrics:
    name: Update GitHub metrics SVG
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: hchen90
          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-metrics.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: update GitHub metrics [skip ci]"

  github-languages:
    name: Update languages SVG
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: hchen90
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 10
          plugin_languages_details: lines, percentage, bytes-size
          plugin_languages_sections: most-used
          filename: github-languages.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: update GitHub languages [skip ci]"

  github-achievements:
    name: Update achievements SVG
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: hchen90
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          filename: github-achievements.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: update GitHub achievements [skip ci]"
